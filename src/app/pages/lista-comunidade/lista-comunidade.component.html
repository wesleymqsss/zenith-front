<app-header></app-header>
<div class="content">
    <div class="card">
        <p-table [value]="dataSource" [paginator]="true" [rows]="5" [tableStyle]="{ 'min-width': '50rem' }"
            [rowsPerPageOptions]="[5, 10, 20]">
            <ng-template #header>
                <tr>
                    <th pSortableColumn="nome"
                        style="width:15% ; background-color: var(--p-breadcrumb-item-color) !important; color: #fff;">
                        Nome
                        <p-sortIcon field="nome" />
                    </th>
                    <th pSortableColumn="email"
                        style="width:15%; background-color: var(--p-breadcrumb-item-color) !important; color: #fff;">
                        Email
                        <p-sortIcon field="email" />
                    </th>
                    <th pSortableColumn="classe"
                        style="width:10%; background-color: var(--p-breadcrumb-item-color) !important; color: #fff;">
                        Classe
                        <p-sortIcon field="classe" />
                    </th>
                    <th pSortableColumn="nivel"
                        style="width:10%; background-color: var(--p-breadcrumb-item-color) !important; color: #fff;">
                        Nível
                        <p-sortIcon field="nivel" />
                    </th>
                    <th pSortableColumn="tipoUsuario"
                        style="width:10%; background-color: var(--p-breadcrumb-item-color) !important; color: #fff;">
                        Perfil
                        <p-sortIcon field="tipoUsuario" />
                    </th>
                    <th pSortableColumn="reputacao"
                        style="width:10%; background-color: var(--p-breadcrumb-item-color) !important; color: #fff;">
                        Reputação
                        <p-sortIcon field="reputacao" />
                    </th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-item>
                <tr>
                    <td>{{ item.nome }}</td>
                    <td>{{ item.email }}</td>
                    <td>{{ item.classe }}</td>
                    <td>{{ item.nivel }}</td>
                    <td>{{ converterPerfil(item.tipoUsuario) }}</td>
                    <td>{{ item.reputacao }}</td>
                </tr>
            </ng-template>

        </p-table>
    </div>
</div>
